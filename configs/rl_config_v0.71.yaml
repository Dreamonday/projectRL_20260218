data:
  # v0.2 数据准备脚本输出的 npz 文件
  dataset_dir: "/data/projectRL_20260218/data/processed_data/rl_dataset_202603101235"

trading:
  initial_cash: 10000000.0
  transaction_cost: 0.001
  max_weight_per_stock: 0.10
  # 提高 temperature 使初始权重分布更平滑，但核心还是靠长训练学习
  softmax_temperature: 2.0  

rl:
  algorithm: "PPO"
  # 增加到 20w 步，让模型有机会收敛
  total_timesteps: 200000
  
  learning_rate: 0.0001
  
  # 显存有限，保持原样
  batch_size: 512
  n_steps: 2048
  n_epochs: 10
  
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  
  # 保持极低熵系数，鼓励确定性策略(尤其是"不动")
  ent_coef: 0.00001
  
  vf_coef: 0.5
  max_grad_norm: 0.5
  hidden_dim: 64
  n_heads: 2
  temporal_window: 10
  normalize_observations: true
  normalize_rewards: false
  device: "cuda"

reward:
  type: "log_return"
  # 恢复正常惩罚，强迫模型学会规避交易成本
  turnover_penalty: 0.5
