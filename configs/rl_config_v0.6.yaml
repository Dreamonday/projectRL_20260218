data:
  merged_data_dir: "/data/projectRL_20260218/data/processed_data/emerge_real_pre_close_price_202603100909"
  min_data_points: 100

  force_resample:
    enabled: true
    rule: "W-FRI"

trading:
  initial_cash: 10000000.0
  transaction_cost: 0.001
  max_weight_per_stock: 0.10
  softmax_temperature: 1.0

rl:
  algorithm: "PPO"
  total_timesteps: 3000
  learning_rate: 0.0003
  batch_size: 256
  n_steps: 512
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  hidden_dim: 64
  n_heads: 2
  temporal_window: 10
  normalize_observations: true
  normalize_rewards: false
  device: "cuda"

split:
  rl_train_end_date: "2025-10-31"

reward:
  type: "log_return"
  turnover_penalty: 0.5
